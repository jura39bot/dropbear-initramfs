#version=RHEL10
# ============================================================
# Kickstart — RHEL 10 Server
# Stockage : EFI + /boot ext4 + LUKS + LVM + ext4
#
# ⚠️  À adapter obligatoirement :
#   - network   : IP, gateway, interface, hostname
#   - rootpw    : hash SHA-512
#   - user      : nom, hash, clé SSH
#   - clearpart : disque cible
#   - passphrase LUKS temporaire (sera remplacé par clevis/Tang)
# ============================================================

# ── Mode installation ────────────────────────────────────────────────────
install
text
reboot --eject

# ── Source d'installation ─────────────────────────────────────────────────
# DVD/ISO local :
# cdrom
# Depuis un miroir HTTP :
url --url=http://IP_MIROIR/rhel10/BaseOS/x86_64/os/

# ── Locale / clavier / timezone ──────────────────────────────────────────
lang fr_FR.UTF-8
keyboard --xlayouts=fr
timezone Europe/Paris --utc

# ── Réseau ────────────────────────────────────────────────────────────────
network --bootproto=static \
        --ip=192.168.1.10 \
        --netmask=255.255.255.0 \
        --gateway=192.168.1.1 \
        --nameserver=192.168.1.1,8.8.8.8 \
        --device=ens3 \
        --activate \
        --hostname=srv-rhel

# ── Sécurité ──────────────────────────────────────────────────────────────
selinux --enforcing
firewall --enabled --service=ssh

# ── Authentification ──────────────────────────────────────────────────────
# Désactiver le compte root (bonne pratique)
rootpw --lock

# Compte admin avec sudo
# Générer le hash : echo 'motdepasse' | openssl passwd -6 -stdin
user --name=adminlocal \
     --groups=wheel \
     --password='$6$rounds=4096$SALT$HASH_A_REMPLACER' \
     --iscrypted

# Clé SSH de l'admin
sshkey --username=adminlocal "ssh-ed25519 AAAA... user@host"

# ── Stockage : EFI + /boot + LUKS + LVM ──────────────────────────────────
zerombr
clearpart --all --initlabel --drives=sda

# Partition EFI (obligatoire pour boot UEFI)
part /boot/efi \
     --fstype=efi \
     --size=512 \
     --asprimary \
     --ondisk=sda

# Partition /boot — non chiffrée (GRUB ne peut pas lire LUKS)
part /boot \
     --fstype=ext4 \
     --size=2048 \
     --ondisk=sda

# Partition LUKS — tout le reste du disque
part pv.luks \
     --size=1 \
     --grow \
     --ondisk=sda \
     --encrypted \
     --passphrase=MotDePasseTemporaire123!

# Groupe de volumes LVM sur le volume LUKS
volgroup rhel-vg pv.luks

# Volume logique racine
logvol / \
        --vgname=rhel-vg \
        --name=rhel-lv \
        --fstype=ext4 \
        --size=1 \
        --grow

# ── Bootloader ────────────────────────────────────────────────────────────
bootloader --location=mbr \
           --boot-drive=sda \
           --append="rd.luks.uuid=luks-AUTO rhgb quiet"

# ── Paquets ───────────────────────────────────────────────────────────────
%packages
@^minimal-environment
@standard
openssh-server
python3
python3-libselinux
lvm2
clevis
clevis-luks
clevis-dracut
dracut-network
# EPEL requis pour dropbear (activé dans %post si souhaité)
# dropbear
%end

# ── Services ──────────────────────────────────────────────────────────────
services --enabled=sshd,clevis-luks-askpass.path
services --disabled=kdump

# ── Post-install ──────────────────────────────────────────────────────────
%post --log=/root/ks-post.log

echo "=== POST-INSTALL START ==="

# Activer EPEL (pour dropbear si nécessaire)
# dnf install -y https://dl.fedoraproject.org/pub/epel/epel-release-latest-10.noarch.rpm
# dnf install -y dropbear

# S'assurer que clevis-dracut est bien intégré
dracut --force --add "clevis crypt network" \
       /boot/initramfs-$(uname -r).img $(uname -r)

# Vérifier que clevis est dans l'initramfs
lsinitrd /boot/initramfs-$(uname -r).img | grep clevis \
  && echo "✅ clevis dans l'initramfs" \
  || echo "⚠️  clevis absent de l'initramfs"

echo "=== POST-INSTALL END ==="

%end
