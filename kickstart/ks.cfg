#version=RHEL10
# ============================================================
# Kickstart — RHEL 10 Server
# Stockage : EFI + /boot ext4 + LUKS + LVM + ext4
# SSH initramfs : dracut-sshd (OpenSSH dans dracut) via EPEL
#
# ⚠️  À adapter obligatoirement :
#   - network     : IP, gateway, interface, hostname
#   - rootpw      : hash SHA-512
#   - user        : nom, hash, clé SSH
#   - clearpart   : disque cible
#   - SSH_KEY     : clé publique pour déverrouillage initramfs
#   - passphrase  : mot de passe LUKS temporaire (remplacé par clevis/Tang)
# ============================================================

# ── Mode installation ────────────────────────────────────────────────────
install
text
reboot --eject

# ── Source d'installation ─────────────────────────────────────────────────
# DVD/ISO local :
# cdrom
# Depuis un miroir HTTP :
url --url=http://IP_MIROIR/rhel10/BaseOS/x86_64/os/

# ── Locale / clavier / timezone ──────────────────────────────────────────
lang fr_FR.UTF-8
keyboard --xlayouts=fr
timezone Europe/Paris --utc

# ── Réseau ────────────────────────────────────────────────────────────────
network --bootproto=static \
        --ip=192.168.1.10 \
        --netmask=255.255.255.0 \
        --gateway=192.168.1.1 \
        --nameserver=192.168.1.1,8.8.8.8 \
        --device=ens3 \
        --activate \
        --hostname=srv-rhel

# ── Sécurité ──────────────────────────────────────────────────────────────
selinux --enforcing
firewall --enabled --service=ssh

# ── Authentification ──────────────────────────────────────────────────────
rootpw --lock

# Compte admin avec sudo
# Générer le hash : echo 'motdepasse' | openssl passwd -6 -stdin
user --name=adminlocal \
     --groups=wheel \
     --password='$6$rounds=4096$SALT$HASH_A_REMPLACER' \
     --iscrypted

# Clé SSH admin (accès SSH normal post-boot)
sshkey --username=adminlocal "ssh-ed25519 AAAA... user@host"

# ── Stockage : EFI + /boot + LUKS + LVM ──────────────────────────────────
zerombr
clearpart --all --initlabel --drives=sda

# Partition EFI
part /boot/efi \
     --fstype=efi \
     --size=512 \
     --asprimary \
     --ondisk=sda

# /boot — non chiffré (GRUB ne peut pas lire LUKS)
part /boot \
     --fstype=ext4 \
     --size=2048 \
     --ondisk=sda

# Partition LUKS — tout le reste du disque
part pv.luks \
     --size=1 \
     --grow \
     --ondisk=sda \
     --encrypted \
     --passphrase=MotDePasseTemporaire123!

# LVM sur LUKS
volgroup rhel-vg pv.luks

# Volume logique racine
logvol / \
        --vgname=rhel-vg \
        --name=rhel-lv \
        --fstype=ext4 \
        --size=1 \
        --grow

# ── Bootloader ────────────────────────────────────────────────────────────
bootloader --location=mbr \
           --boot-drive=sda \
           --append="rd.luks.uuid=luks-AUTO rhgb quiet"

# ── Paquets ───────────────────────────────────────────────────────────────
%packages
@^minimal-environment
@standard
openssh-server
python3
python3-libselinux
lvm2
clevis
clevis-luks
clevis-dracut
dracut-network
%end

# ── Services ──────────────────────────────────────────────────────────────
services --enabled=sshd,clevis-luks-askpass.path
services --disabled=kdump

# ── Post-install ──────────────────────────────────────────────────────────
%post --log=/root/ks-post.log
set -x

echo "=== POST-INSTALL START ==="

# ── 1. Activer EPEL ───────────────────────────────────────────────────────
dnf install -y \
  https://dl.fedoraproject.org/pub/epel/epel-release-latest-10.noarch.rpm
dnf makecache

# ── 2. Installer dracut-sshd (SSH dans initramfs — alternative RHEL à Dropbear) ──
# dracut-sshd intègre OpenSSH dans l'initramfs dracut pour déverrouillage LUKS à distance
dnf install -y dracut-sshd

# ── 3. Configurer la clé SSH autorisée pour l'initramfs ──────────────────
# dracut-sshd utilise /root/.ssh/authorized_keys au boot initramfs
mkdir -p /root/.ssh
chmod 700 /root/.ssh

# ⚠️ Remplacer par la vraie clé publique SSH de déverrouillage
cat > /root/.ssh/authorized_keys << 'EOF'
ssh-ed25519 AAAA... user@host
EOF
chmod 600 /root/.ssh/authorized_keys

# ── 4. Configurer le réseau statique dans l'initramfs ────────────────────
# Nécessaire pour que dracut-sshd soit joignable au boot
# Format : ip=<IP>::<GW>:<MASK>:<HOSTNAME>:<IFACE>:none
cat >> /etc/dracut.conf.d/network.conf << 'EOF'
kernel_cmdline="ip=192.168.1.10::192.168.1.1:255.255.255.0:srv-rhel:ens3:none"
EOF

# ── 5. Config dracut-sshd ─────────────────────────────────────────────────
# Port SSH dans l'initramfs (défaut: 22)
# dracut-sshd utilise le port 22 par défaut (pas configurable facilement)
# Pour changer : modifier le paramètre kernel rd.sshd.port
cat >> /etc/dracut.conf.d/sshd.conf << 'EOF'
add_dracutmodules+=" sshd "
EOF

# ── 6. Régénérer l'initramfs avec dracut-sshd + clevis + réseau ──────────
dracut --force \
       --add "sshd clevis crypt network" \
       /boot/initramfs-$(uname -r).img \
       $(uname -r)

# ── 7. Vérifications ──────────────────────────────────────────────────────
echo "--- Vérification dracut-sshd ---"
lsinitrd /boot/initramfs-$(uname -r).img | grep -E "sshd|dropbear|authorized" \
  && echo "✅ SSH dans l'initramfs" \
  || echo "⚠️  SSH absent de l'initramfs"

echo "--- Vérification clevis ---"
lsinitrd /boot/initramfs-$(uname -r).img | grep clevis \
  && echo "✅ clevis dans l'initramfs" \
  || echo "⚠️  clevis absent de l'initramfs"

echo "--- Vérification réseau initramfs ---"
lsinitrd /boot/initramfs-$(uname -r).img | grep network \
  && echo "✅ réseau dans l'initramfs" \
  || echo "⚠️  réseau absent"

echo "=== POST-INSTALL END ==="

%end
