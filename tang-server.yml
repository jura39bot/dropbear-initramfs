---
# Playbook : Serveur Tang — Ubuntu 24.04 Server
#
# Usage standalone :
#   ansible-playbook -i inventory/hosts.yml tang-server.yml
#
# Variables optionnelles :
#   - tang_port : port d'écoute (défaut: 80)

- name: Setup serveur Tang
  hosts: all
  become: true

  vars:
    tang_port: 80

  tasks:

    - name: Installer tang
      apt:
        name: tang
        state: present
        update_cache: true

    - name: Configurer le port Tang si différent de 80
      block:
        - name: Créer le répertoire override systemd
          file:
            path: /etc/systemd/system/tangd.socket.d
            state: directory
            mode: '0755'

        - name: Override du port
          copy:
            dest: /etc/systemd/system/tangd.socket.d/port.conf
            content: |
              [Socket]
              ListenStream=
              ListenStream={{ tang_port }}
          notify: Recharger systemd

      when: tang_port | int != 80

    - name: Activer et démarrer tangd.socket
      systemd:
        name: tangd.socket
        enabled: true
        state: started
        daemon_reload: true

    - name: Récupérer les clés Tang générées
      shell: ls /var/db/tang/*.jwk 2>/dev/null | head -5
      register: tang_keys
      changed_when: false

    - name: Récupérer l'empreinte (thumbprint) de la clé Tang
      shell: |
        tang-show-keys 2>/dev/null || \
        for k in /var/db/tang/*.jwk; do
          jose jwk thp -i "$k" 2>/dev/null
        done | head -1
      register: tang_thp
      changed_when: false
      ignore_errors: true

    - name: "✅ Serveur Tang prêt"
      debug:
        msg: |
          Serveur Tang opérationnel sur le port {{ tang_port }}.
          URL : http://{{ ansible_default_ipv4.address }}:{{ tang_port }}

          Thumbprint à utiliser côté client :
          {{ tang_thp.stdout | default('Récupérer avec : jose jwk thp -i /var/db/tang/*.jwk') }}

          Commande client :
          clevis luks bind -d /dev/sdX tang \
            '{"url":"http://{{ ansible_default_ipv4.address }}:{{ tang_port }}","thp":"{{ tang_thp.stdout | default("<THUMBPRINT>") }}"}'

  handlers:
    - name: Recharger systemd
      systemd:
        daemon_reload: true
